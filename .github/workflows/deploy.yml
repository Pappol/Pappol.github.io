name: Deploy to GitHub Pages

on:
  # Run on every push to the main branch
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          package-manager: npm@latest
          node-version: 22
        # Runs: npm install + npm run build, uploads ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Email subscribers about any newly *released* post, then record it so it is
  # never sent twice. Runs only after the site is live. Edits and deletions of
  # existing posts do not trigger a send — see scripts/send-newsletter.mjs.
  notify:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Announce new posts
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
          MAILERLITE_FROM_EMAIL: ${{ secrets.MAILERLITE_FROM_EMAIL }}
          MAILERLITE_FROM_NAME: ${{ vars.MAILERLITE_FROM_NAME }}
          SITE_URL: https://pappol.github.io
        run: node scripts/send-newsletter.mjs
      - name: Record sent posts
        run: |
          if ! git diff --quiet -- .newsletter/sent.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .newsletter/sent.json
            git commit -m "chore(newsletter): record sent posts [skip ci]"
            git push origin HEAD:main
          else
            echo "No newsletter state change to commit."
          fi
